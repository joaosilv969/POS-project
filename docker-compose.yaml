services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bar-pos-app:latest
    container_name: bar-app
    restart: unless-stopped
    ports:
      - "${APP_PUBLIC_PORT:-8080}:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bar_db}
      DB_USER: ${DB_USER:-bar_user}
      DB_PASSWORD: ${DB_PASSWORD:-bar_password}
      UPLOAD_DIR: /app/uploads
      ADMIN_CANCEL_PIN: ${ADMIN_CANCEL_PIN:-}

  mariadb:
    image: mariadb:11.4
    container_name: bar-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${DB_NAME:-bar_db}
      MARIADB_USER: ${DB_USER:-bar_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-bar_password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PUBLIC_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bar-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PUBLIC_PORT:-8081}:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    depends_on:
      - mariadb

volumes:
  db_data:
  uploads_data:
